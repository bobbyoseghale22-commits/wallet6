<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Marsh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a href="/" class="brand">
        <span class="logo-mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 18V6l6 6 6-6v12M21 6v12" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        Marsh
      </a>
      <div class="nav-links">
        <a href="/dashboard" class="btn btn-ghost btn-sm">Dashboard</a>
        <a href="/profile" class="btn btn-ghost btn-sm">Profile</a>
        <a href="/admin" id="admin-link" class="btn btn-ghost btn-sm hidden">Admin</a>
        <button id="logout-btn" class="btn btn-danger btn-sm">Logout</button>
      </div>
    </div>
  </nav>

  <main class="app-main">
    <div class="container">
      <div class="page-head">
        <h1 id="greeting">Welcome back</h1>
        <p>Here's an overview of your portfolio.</p>
      </div>

      <!-- Profile summary -->
      <div class="glass profile-card">
        <div id="avatar-host"></div>
        <div class="profile-meta">
          <h2 id="u-name">—</h2>
          <div class="email" id="u-email">—</div>
        </div>
        <div class="profile-stats">
          <div class="item"><div class="k">Member since</div><div class="v" id="u-created">—</div></div>
          <div class="item"><div class="k">Last login</div><div class="v" id="u-lastlogin">—</div></div>
        </div>
      </div>

      <!-- Balance -->
      <div class="glass balance-card">
        <div class="k">Total Wallet Balance</div>
        <div class="v" id="total-balance">$0.00</div>
        <span class="badge success mt-sm">● Live demo balance</span>
      </div>

      <!-- Wallets -->
      <h2 class="section-title" style="font-size:1.3rem;margin-bottom:18px">Your Assets</h2>
      <div class="grid wallet-grid">
        <div class="glass wallet-card">
          <div class="top">
            <div class="coin btc">₿</div>
            <span class="badge">Bitcoin</span>
          </div>
          <div class="amt" id="btc-amt">0 BTC</div>
          <div class="fiat" id="btc-fiat">$0.00</div>
          <div class="change up" id="btc-change">▲ 0.0% (24h)</div>
        </div>
        <div class="glass wallet-card">
          <div class="top">
            <div class="coin eth">Ξ</div>
            <span class="badge">Ethereum</span>
          </div>
          <div class="amt" id="eth-amt">0 ETH</div>
          <div class="fiat" id="eth-fiat">$0.00</div>
          <div class="change up" id="eth-change">▲ 0.0% (24h)</div>
        </div>
        <div class="glass wallet-card">
          <div class="top">
            <div class="coin usdt">₮</div>
            <span class="badge">USDT</span>
          </div>
          <div class="amt" id="usdt-amt">0 USDT</div>
          <div class="fiat" id="usdt-fiat">$0.00</div>
          <div class="change up" id="usdt-change">▲ 0.0% (24h)</div>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/core.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
