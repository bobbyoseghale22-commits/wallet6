<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Marsh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a href="/" class="brand">
        <span class="logo-mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 18V6l6 6 6-6v12M21 6v12" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        Marsh
      </a>
      <div class="nav-links">
        <a href="/dashboard" class="btn btn-ghost btn-sm">Dashboard</a>
        <a href="/profile" class="btn btn-ghost btn-sm">Profile</a>
        <a href="/admin" class="btn btn-ghost btn-sm">Admin</a>
        <button id="logout-btn" class="btn btn-danger btn-sm">Logout</button>
      </div>
    </div>
  </nav>

  <main class="app-main">
    <div class="container">
      <div class="page-head flex justify-between items-center" style="flex-wrap:wrap;gap:12px">
        <div>
          <h1>Admin Panel</h1>
          <p>Manage users, balances, and access. <span class="badge purple">Restricted</span></p>
        </div>
        <div class="badge"><span id="user-count">0</span> total users</div>
      </div>

      <div class="glass" style="padding:22px;margin-top:24px">
        <div class="toolbar">
          <input class="input search" id="search" type="text" placeholder="Search by name or email…" />
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>User</th>
                <th>Role</th>
                <th>Balance</th>
                <th>Status</th>
                <th>Created</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="user-rows">
              <tr><td colspan="6" class="center muted">Loading users…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Edit modal -->
  <div class="modal-overlay hidden" id="edit-modal">
    <div class="glass modal">
      <h3>Edit User</h3>
      <input type="hidden" id="edit-id" />
      <div class="field">
        <label for="edit-name">Name</label>
        <input class="input" type="text" id="edit-name" />
      </div>
      <div class="field">
        <label for="edit-email">Email</label>
        <input class="input" type="email" id="edit-email" />
      </div>
      <div class="grid" style="grid-template-columns:1fr 1fr;gap:16px">
        <div class="field">
          <label for="edit-balance">Balance (USD)</label>
          <input class="input" type="number" id="edit-balance" min="0" step="0.01" />
        </div>
        <div class="field">
          <label for="edit-role">Role</label>
          <select class="input" id="edit-role">
            <option value="user">user</option>
            <option value="admin">admin</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label for="edit-password">Reset password (optional)</label>
        <input class="input" type="password" id="edit-password" placeholder="Leave blank to keep current" autocomplete="new-password" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="cancel-edit">Cancel</button>
        <button class="btn btn-primary" id="save-edit">Save</button>
      </div>
    </div>
  </div>

  <script src="/js/core.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
