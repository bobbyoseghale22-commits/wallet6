<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Marsh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a href="/" class="brand">
        <span class="logo-mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 18V6l6 6 6-6v12M21 6v12" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        Marsh
      </a>
      <div class="nav-links">
        <a href="/" class="btn btn-ghost btn-sm">← Home</a>
      </div>
    </div>
  </nav>

  <div class="auth-wrap" style="padding: 40px 0">
    <div class="glass auth-card" style="max-width:520px">
      <div class="logo-mark-lg">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M3 18V6l6 6 6-6v12M21 6v12" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h1>Create your account</h1>
      <p class="sub">Secure Crypto. Simplified.</p>

      <div class="field">
        <label for="name">Full Name</label>
        <input class="input" type="text" id="name" placeholder="Jane Doe" autocomplete="name" />
      </div>
      <div class="field">
        <label for="email">Email Address</label>
        <input class="input" type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="grid" style="grid-template-columns:1fr 1fr;gap:16px">
        <div class="field">
          <label for="country">Country</label>
          <select class="input" id="country">
            <option value="">Select country…</option>
            <option>Afghanistan</option><option>Albania</option><option>Algeria</option>
            <option>Andorra</option><option>Angola</option><option>Argentina</option>
            <option>Armenia</option><option>Australia</option><option>Austria</option>
            <option>Azerbaijan</option><option>Bahamas</option><option>Bahrain</option>
            <option>Bangladesh</option><option>Belarus</option><option>Belgium</option>
            <option>Belize</option><option>Bolivia</option><option>Bosnia and Herzegovina</option>
            <option>Brazil</option><option>Brunei</option><option>Bulgaria</option>
            <option>Cambodia</option><option>Cameroon</option><option>Canada</option>
            <option>Chile</option><option>China</option><option>Colombia</option>
            <option>Costa Rica</option><option>Croatia</option><option>Cuba</option>
            <option>Cyprus</option><option>Czech Republic</option><option>Denmark</option>
            <option>Dominican Republic</option><option>Ecuador</option><option>Egypt</option>
            <option>El Salvador</option><option>Estonia</option><option>Ethiopia</option>
            <option>Finland</option><option>France</option><option>Georgia</option>
            <option>Germany</option><option>Ghana</option><option>Greece</option>
            <option>Guatemala</option><option>Honduras</option><option>Hungary</option>
            <option>Iceland</option><option>India</option><option>Indonesia</option>
            <option>Iran</option><option>Iraq</option><option>Ireland</option>
            <option>Israel</option><option>Italy</option><option>Jamaica</option>
            <option>Japan</option><option>Jordan</option><option>Kazakhstan</option>
            <option>Kenya</option><option>Kuwait</option><option>Latvia</option>
            <option>Lebanon</option><option>Lithuania</option><option>Luxembourg</option>
            <option>Malaysia</option><option>Malta</option><option>Mexico</option>
            <option>Moldova</option><option>Morocco</option><option>Mozambique</option>
            <option>Myanmar</option><option>Nepal</option><option>Netherlands</option>
            <option>New Zealand</option><option>Nicaragua</option><option>Nigeria</option>
            <option>North Macedonia</option><option>Norway</option><option>Oman</option>
            <option>Pakistan</option><option>Panama</option><option>Paraguay</option>
            <option>Peru</option><option>Philippines</option><option>Poland</option>
            <option>Portugal</option><option>Qatar</option><option>Romania</option>
            <option>Russia</option><option>Saudi Arabia</option><option>Senegal</option>
            <option>Serbia</option><option>Singapore</option><option>Slovakia</option>
            <option>Slovenia</option><option>South Africa</option><option>South Korea</option>
            <option>Spain</option><option>Sri Lanka</option><option>Sudan</option>
            <option>Sweden</option><option>Switzerland</option><option>Syria</option>
            <option>Taiwan</option><option>Tanzania</option><option>Thailand</option>
            <option>Tunisia</option><option>Turkey</option><option>Uganda</option>
            <option>Ukraine</option><option>United Arab Emirates</option>
            <option>United Kingdom</option><option>United States</option>
            <option>Uruguay</option><option>Uzbekistan</option><option>Venezuela</option>
            <option>Vietnam</option><option>Yemen</option><option>Zimbabwe</option>
          </select>
        </div>
        <div class="field">
          <label for="phone">Phone Number</label>
          <input class="input" type="tel" id="phone" placeholder="+1 555 000 0000" autocomplete="tel" />
        </div>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input class="input" type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password" />
      </div>
      <div class="field">
        <label for="confirm-password">Confirm Password</label>
        <input class="input" type="password" id="confirm-password" placeholder="Repeat your password" autocomplete="new-password" />
      </div>
      <button class="btn btn-primary w-full" id="register-btn">Create Account</button>

      <p class="muted mt-md" style="font-size:0.92rem">
        Already have an account? <a href="/login">Sign in</a>
      </p>
      <p class="muted mt-md" style="font-size:0.82rem">
        Passwords are hashed with bcrypt and never stored in plain text.
      </p>
    </div>
  </div>

  <script src="/js/core.js"></script>
  <script src="/js/register.js"></script>
</body>
</html>
