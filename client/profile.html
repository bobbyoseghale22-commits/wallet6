<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Marsh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a href="/" class="brand">
        <span class="logo-mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 18V6l6 6 6-6v12M21 6v12" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        Marsh
      </a>
      <div class="nav-links">
        <a href="/dashboard" class="btn btn-ghost btn-sm">Dashboard</a>
        <a href="/profile" class="btn btn-ghost btn-sm">Profile</a>
        <a href="/admin" id="admin-link" class="btn btn-ghost btn-sm hidden">Admin</a>
        <button id="logout-btn" class="btn btn-danger btn-sm">Logout</button>
      </div>
    </div>
  </nav>

  <main class="app-main">
    <div class="container">
      <div class="page-head">
        <h1>Profile Management</h1>
        <p>Update your account details and security credentials.</p>
      </div>

      <div class="glass profile-card mt-md">
        <div id="avatar-host"></div>
        <div class="profile-meta">
          <h2 id="p-name-display">—</h2>
          <div class="email" id="p-email-display">—</div>
        </div>
        <div class="profile-stats">
          <div class="item"><div class="k">Role</div><div class="v" id="p-role">—</div></div>
          <div class="item"><div class="k">Member since</div><div class="v" id="p-created">—</div></div>
          <div class="item"><div class="k">Last login</div><div class="v" id="p-lastlogin">—</div></div>
        </div>
      </div>

      <div class="flex gap-md mt-lg" style="flex-wrap:wrap;align-items:flex-start">
        <!-- Account details -->
        <div class="glass form-card">
          <h3 style="margin-bottom:18px">Account Details</h3>
          <div class="field">
            <label for="name">Full name</label>
            <input class="input" type="text" id="name" />
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input class="input" type="email" id="email" disabled />
            <p class="muted" style="font-size:0.78rem;margin-top:6px">Email changes are managed by an administrator.</p>
          </div>
          <button class="btn btn-primary" id="save-profile">Save Changes</button>
        </div>

        <!-- Security -->
        <div class="glass form-card">
          <h3 style="margin-bottom:18px">Security</h3>
          <div class="field">
            <label for="new-password">New password</label>
            <input class="input" type="password" id="new-password" placeholder="At least 8 characters" autocomplete="new-password" />
          </div>
          <div class="field">
            <label for="confirm-password">Confirm password</label>
            <input class="input" type="password" id="confirm-password" placeholder="Re-enter password" autocomplete="new-password" />
          </div>
          <button class="btn btn-primary" id="save-password">Update Password</button>
          <p class="muted" style="font-size:0.78rem;margin-top:14px">
            🔒 Passwords are hashed with bcrypt before storage. We never store plain text.
          </p>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/core.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
