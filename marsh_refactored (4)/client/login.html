<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Marsh</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a href="/" class="brand">
        <span class="logo-mark">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 18V6l6 6 6-6v12M21 6v12" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
        Marsh
      </a>
      <div class="nav-links">
        <a href="/" class="btn btn-ghost btn-sm">← Home</a>
      </div>
    </div>
  </nav>

  <div class="auth-wrap">
    <div class="glass auth-card">
      <div class="logo-mark-lg">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M3 18V6l6 6 6-6v12M21 6v12" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h1>Welcome back to Marsh</h1>
      <p class="sub">Secure Crypto. Simplified.</p>

      <div class="field">
        <label for="email">Email</label>
        <input class="input" type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input class="input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn btn-primary w-full" id="email-login">Sign In</button>

      <p class="muted mt-md" style="font-size:0.92rem">
        Don't have an account? <a href="/register">Create one</a>
      </p>

      <p class="muted mt-md" style="font-size:0.82rem">
        Protected by JWT authentication and CSRF tokens.
      </p>
    </div>
  </div>

  <script src="/js/core.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
